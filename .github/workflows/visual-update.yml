name: Visual Update
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to (re)generate baselines on
        required: true
  issue_comment:
    types: [created]
jobs:
  resolve:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '/update-snapshots') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
       github.event.comment.author_association))
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.pick.outputs.ref }}
    steps:
      - name: Resolve target ref
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            ref=$(gh pr view "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --json headRefName -q .headRefName)
            echo "ref=$ref" >> "$GITHUB_OUTPUT"
          fi
  update:
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 24 }
      - uses: pnpm/action-setup@v3
        with: { run_install: true }
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:visual:update
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'test: update visual baselines'
          file_pattern: 'tests/visual/**/*.png'
          branch: ${{ needs.resolve.outputs.ref }}
