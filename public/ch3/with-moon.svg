<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="with-moon-title with-moon-desc" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <title id="with-moon-title">Sun, Earth, and Moon</title>
  <desc id="with-moon-desc">A schematic diagram of the Sun on the left, Earth at center with a tilted axis, and the Moon in orbit around Earth.</desc>
  <g fill="none" stroke="#d6d2c5" stroke-width="1">
    <!-- Sun -->
    <circle cx="70" cy="200" r="42" fill="#f3a857" stroke="none"/>
    <g stroke="#f3a857" stroke-width="1.25" stroke-linecap="round">
      <line x1="70" y1="140" x2="70" y2="130"/>
      <line x1="70" y1="260" x2="70" y2="270"/>
      <line x1="10" y1="200" x2="0" y2="200"/>
      <line x1="130" y1="200" x2="140" y2="200"/>
      <line x1="28" y1="158" x2="21" y2="151"/>
      <line x1="112" y1="242" x2="119" y2="249"/>
      <line x1="28" y1="242" x2="21" y2="249"/>
      <line x1="112" y1="158" x2="119" y2="151"/>
    </g>
    <text x="70" y="310" text-anchor="middle" fill="#d6d2c5" font-size="12" stroke="none" letter-spacing="0.5">sun</text>
    <!-- Earth orbit around Sun, suggested as a gentle arc -->
    <path d="M 160 200 Q 380 80 600 200" stroke="#4a4637" stroke-dasharray="2 6" stroke-width="1"/>
    <!-- Earth -->
    <g transform="translate(500 200)">
      <circle r="34" fill="#3a6b8a" stroke="none"/>
      <!-- axial tilt 23.5 degrees, line through Earth -->
      <line x1="-14" y1="-44" x2="14" y2="44" stroke="#d6d2c5" stroke-width="1" stroke-dasharray="3 3"/>
      <!-- Moon orbit -->
      <ellipse cx="0" cy="0" rx="95" ry="24" fill="none" stroke="#4a4637" stroke-dasharray="2 6" stroke-width="1"/>
      <!-- Moon -->
      <circle cx="95" cy="0" r="10" fill="#c8c3b4" stroke="none"/>
      <text x="95" y="28" text-anchor="middle" fill="#d6d2c5" font-size="11" stroke="none">moon</text>
      <text x="0" y="56" text-anchor="middle" fill="#d6d2c5" font-size="12" stroke="none" letter-spacing="0.5">earth</text>
      <text x="-14" y="-54" text-anchor="middle" fill="#7a7568" font-size="9" stroke="none">23.5°</text>
    </g>
    <!-- caption -->
    <text x="400" y="380" text-anchor="middle" fill="#858591" font-size="11" stroke="none" letter-spacing="0.75">not to scale</text>
  </g>
</svg>
